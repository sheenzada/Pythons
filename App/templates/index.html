{% extends "base.html" %}

{% block content %}
    <h2>Available Movies</h2>
    {% for movie in movies %}
        <div class="movie-card">
            <h3>{{ movie.title }} ({{ movie.year }})</h3>
            <p>⭐ Rating: {{ movie.rating }}</p>
            <a href="/movie/{{ movie.id }}">View Details</a>
        </div>
    {% endfor %}
{% endblock %}
